services:
  catalog-ms:
    build:
      context: ../../source/main
      dockerfile: ../../container/main/Dockerfile
    image: catalog-ms:latest
    ports:
      - "7171:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/catalog_ms_db
      SPRING_DATASOURCE_USERNAME: catalog
      SPRING_DATASOURCE_PASSWORD: catalog
      # JWT signing secret (HS256, >= 32 chars). Override for anything beyond local use.
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-please-32+chars-secret-key}

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: catalog_ms_db
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog_ms_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
