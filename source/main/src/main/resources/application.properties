spring.application.name=catalog-ms

# Datasource (env-overridable; Docker injects SPRING_DATASOURCE_* pointing at the postgres service)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/catalog_ms_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:catalog}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:catalog}

# JPA / Hibernate — Flyway owns the schema now, so Hibernate only validates (never alters)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway — versioned SQL migrations in classpath:db/migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT — HMAC secret must be >= 32 chars for HS256. Override JWT_SECRET in every real
# environment; the default here is for local/dev only.
jwt.secret=${JWT_SECRET:dev-only-change-me-please-32+chars-secret-key}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
